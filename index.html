<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kotoba-lab</title>
    <meta
      name="description"
      content="kotoba-lab research notebook prototype rendered from Kotoba source."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="app-status">prototype</p>
          <h1 id="app-title">kotoba-lab</h1>
        </div>
        <nav class="top-actions" aria-label="Project actions">
          <button id="toolbar-run" type="button" class="primary-action">Run</button>
          <button id="save-button" type="button">Save</button>
          <button id="reset-button" type="button">Reset</button>
          <button id="export-button" type="button">Export</button>
          <label class="import-label" for="import-file">Import</label>
          <input id="import-file" type="file" accept="application/json,.json" />
          <a id="source-link" href="./lab.kotoba">Kotoba source</a>
          <a
            id="adr-link"
            href="https://github.com/kotoba-lang/kotoba-lang/blob/main/docs/adr/ADR-kotoba-lab-research-notebook.md"
            >ADR</a
          >
        </nav>
      </header>

      <main class="workspace">
        <aside class="panel outline-panel" aria-label="Notebook outline">
          <div class="panel-heading">
            <span>Notebook</span>
            <strong id="replay-status">loading</strong>
          </div>
          <h2 id="notebook-title">Loading notebook</h2>
          <dl class="meta-grid">
            <div>
              <dt>Run</dt>
              <dd id="run-id">-</dd>
            </div>
            <div>
              <dt>Runtime</dt>
              <dd id="runtime">-</dd>
            </div>
          </dl>
          <div class="block-toolbar" aria-label="Add notebook blocks">
            <button type="button" data-add-block="kotoba">+ Kotoba</button>
            <button type="button" data-add-block="markdown">+ Note</button>
            <button type="button" data-add-block="llm">+ LLM</button>
          </div>
          <div id="cell-list" class="cell-list"></div>
        </aside>

        <section class="panel editor-panel" aria-label="Selected cell">
          <div class="panel-heading">
            <span id="selected-kind">Cell</span>
            <strong id="selected-status">ready</strong>
          </div>
          <div class="editor-title-row">
            <h2 id="selected-title">Select a cell</h2>
            <div class="segmented" aria-label="Cell commands">
              <button id="run-button" type="button" class="primary-action">Run</button>
              <button id="replay-button" type="button">Replay</button>
              <button id="infer-button" type="button">Infer</button>
              <button id="evidence-button" type="button">Evidence</button>
            </div>
          </div>
          <textarea
            id="source-editor"
            class="source-editor"
            spellcheck="false"
            aria-label="Cell source editor"
          ></textarea>
          <div class="policy-strip" id="policy-strip"></div>
          <div class="result-band">
            <span>Result</span>
            <strong id="cell-output">-</strong>
          </div>
          <div class="inference-strip" id="cell-inference"></div>
        </section>

        <aside class="panel evidence-panel" aria-label="Evidence and artifacts">
          <div class="tabs" role="tablist" aria-label="Evidence tabs">
            <button class="tab is-active" type="button" data-tab="artifacts">
              Artifacts
            </button>
            <button class="tab" type="button" data-tab="evidence">
              Evidence
            </button>
            <button class="tab" type="button" data-tab="assistant">
              Assistant
            </button>
            <button class="tab" type="button" data-tab="runtime">
              Runtime
            </button>
            <button class="tab" type="button" data-tab="maturity">
              Maturity
            </button>
          </div>
          <div id="artifacts-tab" class="tab-panel"></div>
          <div id="evidence-tab" class="tab-panel is-hidden"></div>
          <div id="assistant-tab" class="tab-panel is-hidden">
            <div class="assistant-card">
              <strong>Kotoba inference</strong>
              <span id="assistant-summary">Select a cell to infer policy and replay state.</span>
            </div>
            <div class="prompt-row">
              <textarea
                id="assistant-prompt"
                aria-label="LLM prompt"
                placeholder="Ask for a Kotoba analysis cell..."
              ></textarea>
              <button id="assistant-generate" type="button">Generate cell</button>
            </div>
            <div id="assistant-output" class="assistant-output"></div>
          </div>
          <div id="runtime-tab" class="tab-panel is-hidden"></div>
          <div id="maturity-tab" class="tab-panel is-hidden"></div>
        </aside>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
